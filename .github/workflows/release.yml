name: release

on:
  push:
    tags:
      - "v*"

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build devflow
        run: go build -v -o /tmp/devflow ./cmd/devflow
